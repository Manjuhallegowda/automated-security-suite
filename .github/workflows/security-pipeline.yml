name: DevSecOps Pipeline
on: [push]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Tools
        run: pip install bandit pytest oci
      - name: Execute Security Framework
        run: python src/security_framework.py
      - name: Run Unit Tests
        run: pytest tests/